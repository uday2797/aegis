bundle:
  name: aegis-de-project
  # ⚠️  DEPLOYMENT POLICY: Do NOT run `databricks bundle deploy` manually.
  #    All deployments must go through GitHub Actions (cd.yml).
  #    Push to master → CD pipeline deploys automatically.
  #    Manual deploy via workflow_dispatch is available in GitHub UI only.

workspace:
  host: https://dbc-c486d425-ef89.cloud.databricks.com/

include:
  - resources/jobs/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: ~/.bundle/${bundle.name}/dev

  prod:
    mode: production
    workspace:
      root_path: ~/.bundle/${bundle.name}/prod
