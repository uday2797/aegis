name: CI — Lint, Test & Validate

on:
  pull_request:
    branches: [master, main]
    paths:
      - "de_project/**"
      - "src/**"
      - "tests/**"

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run test suite
        env:
          SIMULATION_MODE: "true"
          DATABRICKS_USER_EMAIL: "ci@example.com"
        run: |
          echo "=== Running AEGIS test suite ==="
          python -m pytest tests/ -v --tb=short --ignore=tests/test_integration_smoke.py
          echo "=== Tests complete ==="

  validate-bundle:
    name: Validate DAB Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        working-directory: de_project
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
